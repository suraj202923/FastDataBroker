---
# HorizontalPodAutoscaler for dynamic scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: FastDataBroker-hpa
  namespace: FastDataBroker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: FastDataBroker
  minReplicas: 3
  maxReplicas: 10
  metrics:
    # CPU-based scaling
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # Memory-based scaling
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max

---
# Ingress for HTTP/HTTPS routing
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: FastDataBroker-ingress
  namespace: FastDataBroker
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - FastDataBroker.example.com
      secretName: FastDataBroker-tls
  rules:
    - host: FastDataBroker.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: FastDataBroker-api
                port:
                  number: 80
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: FastDataBroker-metrics
                port:
                  number: 9090
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: FastDataBroker-api
                port:
                  number: 80

---
# ServiceMonitor for Prometheus scraping
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: FastDataBroker
  namespace: FastDataBroker
  labels:
    app: FastDataBroker
spec:
  selector:
    matchLabels:
      app: FastDataBroker
  endpoints:
    - port: http
      interval: 30s
      path: /metrics
      scheme: http
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - sourceLabels: [__meta_kubernetes_pod_label_version]
          targetLabel: version

---
# PrometheusRule for alerting
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: FastDataBroker-alerts
  namespace: FastDataBroker
spec:
  groups:
    - name: FastDataBroker.rules
      interval: 30s
      rules:
        # Alert: High error rate
        - alert: FastDataBrokerHighErrorRate
          expr: |
            (rate(FastDataBroker_messages_failed_total[5m]) / 
             rate(FastDataBroker_messages_received_total[5m])) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "FastDataBroker high error rate"
            description: "Error rate > 5% for 5 minutes"

        # Alert: Queue backlog
        - alert: FastDataBrokerHighQueueBacklog
          expr: FastDataBroker_queue_size > 100000
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "FastDataBroker queue backlog high"
            description: "Queue size > 100K messages"

        # Alert: Delivery latency
        - alert: FastDataBrokerHighDeliveryLatency
          expr: |
            histogram_quantile(0.95, 
              rate(FastDataBroker_delivery_latency_ms_bucket[5m])) > 5000
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "FastDataBroker delivery latency high"
            description: "95th percentile latency > 5000ms"

        # Alert: Circuit breaker open
        - alert: FastDataBrokerCircuitBreakerOpen
          expr: FastDataBroker_circuit_breaker_status == 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "FastDataBroker circuit breaker open"
            description: "Service circuit breaker is in open state"

        # Alert: Low available replicas
        - alert: PostoffficeLowReplicas
          expr: |
            count(up{job="FastDataBroker"}) < 2
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "FastDataBroker: Low replica count"
            description: "Less than 2 replicas available"

---
# Service for Prometheus metrics export
apiVersion: v1
kind: Service
metadata:
  name: FastDataBroker-metrics
  namespace: FastDataBroker
  labels:
    app: FastDataBroker
spec:
  type: ClusterIP
  selector:
    app: FastDataBroker
  ports:
    - name: metrics
      port: 9090
      targetPort: http
      protocol: TCP

---
# ConfigMap for Prometheus scrape config
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-FastDataBroker-config
  namespace: FastDataBroker
data:
  FastDataBroker-scrape.yaml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
    
    scrape_configs:
      - job_name: 'FastDataBroker'
        static_configs:
          - targets: ['FastDataBroker-metrics:9090']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
