version: '3.9'

services:
  # FastDataBroker main service
  FastDataBroker:
    image: FastDataBroker:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: FastDataBroker-main
    ports:
      - "6379:6379/udp"  # QUIC
      - "6380:6380/tcp"  # HTTP
      - "6381:6381/tcp"  # gRPC
    environment:
      RUST_LOG: info,FastDataBroker=debug
      RUST_BACKTRACE: "1"
      FastDataBroker_BIND: "0.0.0.0:6379"
      JAEGER_HOST: jaeger
      JAEGER_PORT: "6831"
      METRIC_ENABLED: "true"
    depends_on:
      - jaeger
      - prometheus
    volumes:
      - FastDataBroker-data:/data
      - ./config:/etc/FastDataBroker:ro
    networks:
      - FastDataBroker-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6380/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "6831:6831/udp"      # Jaeger agent
      - "16686:16686"         # Web UI
      - "14268:14268"         # Collector HTTP
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
      MEMORY_MAX_TRACES: "10000"
    networks:
      - FastDataBroker-network
    restart: unless-stopped

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - FastDataBroker-network
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: "grafana-piechart-panel"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - FastDataBroker-network
    restart: unless-stopped

  # PostgreSQL for optional data storage
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: FastDataBroker
      POSTGRES_USER: FastDataBroker
      POSTGRES_PASSWORD: change-me-now
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U FastDataBroker"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - FastDataBroker-network
    restart: unless-stopped

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass FastDataBroker-redis-pass
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - FastDataBroker-network
    restart: unless-stopped

  # Nginx as reverse proxy and load balancer
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./monitoring/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - FastDataBroker
    networks:
      - FastDataBroker-network
    restart: unless-stopped

volumes:
  FastDataBroker-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  FastDataBroker-network:
    driver: bridge

# Usage:
# docker-compose up -d          # Start all services
# docker-compose down           # Stop all services
# docker-compose logs -f        # View logs
# docker-compose ps             # Show status
# 
# Access URLs:
# - FastDataBroker API: http://localhost:6380
# - Prometheus: http://localhost:9090
# - Grafana: http://localhost:3000 (admin/admin)
# - Jaeger UI: http://localhost:16686
# - PostgreSQL: localhost:5432
# - Redis: localhost:6379
