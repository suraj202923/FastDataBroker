name: "[NuGet] C# SDK Publish"

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      publish_to_nuget:
        description: 'Publish to NuGet (true/false)'
        required: false
        default: 'false'

concurrency:
  group: nuget-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 3
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet-version: ['8.0.x']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up .NET ${{ matrix.dotnet-version }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}
        cache: true
        cache-dependency-path: sdks/csharp/FastDataBrokerSDK.csproj
    
    - name: Restore NuGet packages
      working-directory: sdks/csharp
      run: dotnet restore
    
    - name: Build
      working-directory: sdks/csharp
      run: dotnet build --configuration Release --no-restore
    
    - name: Run unit tests
      working-directory: sdks/csharp
      run: dotnet test --configuration Release --no-build --verbosity normal
    
    - name: Generate code coverage
      working-directory: sdks/csharp
      run: dotnet test --configuration Release --no-build --collect:"XPlat Code Coverage" /p:CoverageOutputFormat=opencover
      continue-on-error: true

  publish-nuget:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_nuget == 'true')

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        cache: true
        cache-dependency-path: sdks/csharp/FastDataBrokerSDK.csproj
    
    - name: Restore dependencies
      working-directory: sdks/csharp
      run: dotnet restore
    
    - name: Build Release
      working-directory: sdks/csharp
      run: dotnet build --configuration Release --no-restore
    
    - name: Create output directory
      run: mkdir -p ${{ github.workspace }}/nupkg
    
    - name: Pack NuGet package
      working-directory: sdks/csharp
      run: |
        dotnet pack --configuration Release --output "${{ github.workspace }}/nupkg" -v d
        if [ $? -ne 0 ]; then
          echo "❌ Pack failed!"
          exit 1
        fi
    
    - name: List packed files
      run: |
        echo "Listing nupkg directory:"
        if [ -d "${{ github.workspace }}/nupkg" ]; then
          ls -la "${{ github.workspace }}/nupkg/"
        else
          echo "❌ Directory does not exist!"
          exit 1
        fi
    
    - name: Publish to NuGet
      run: |
        NUPKG_DIR="${{ github.workspace }}/nupkg"
        NUPKG_COUNT=$(find "$NUPKG_DIR" -name "*.nupkg" -type f | wc -l)
        echo "Found $NUPKG_COUNT .nupkg files"
        
        if [ $NUPKG_COUNT -eq 0 ]; then
          echo "❌ No .nupkg files found!"
          exit 1
        fi
        
        find "$NUPKG_DIR" -name "*.nupkg" -type f | while read f; do
          echo "Publishing: $f"
          dotnet nuget push "$f" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --skip-duplicate
          
          if [ $? -ne 0 ]; then
            echo "❌ NuGet push failed for $f"
            exit 1
          fi
        done
        
        echo "✅ Package published successfully"
    
    - name: Create GitHub Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${{ github.ref_name }}" \
          --repo="$GITHUB_REPOSITORY" \
          --title="FastDataBroker C# SDK ${{ github.ref_name }}" \
          --notes="## C# SDK Release
        
        **Version:** ${{ github.ref_name }}
        
        ### Changes
        - Supports .NET 6.0, 7.0, 8.0
        - Available on NuGet: https://www.nuget.org/packages/FastDataBroker/
        
        ### Installation
        \`\`\`
        dotnet add package FastDataBroker
        \`\`\`"

  nuget-validation:
    needs: publish-nuget
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_nuget == 'true')

    steps:
    - name: Check NuGet package availability
      run: |
        PACKAGE_VERSION=${GITHUB_REF#refs/tags/v}
        echo "Checking NuGet for FastDataBroker ${PACKAGE_VERSION}..."
        sleep 30  # Wait for NuGet to index the package
        
        curl -s "https://api.nuget.org/v3/registration5-semver0/fastdatabroker/index.json" | grep -i "version" || echo "Package not yet available, may take a few minutes to index"
      continue-on-error: true