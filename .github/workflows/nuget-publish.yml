name: NuGet Publish (Multi-OS)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write   # 🔥 REQUIRED: This is what generates the OIDC token

jobs:
  build-and-publish:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # If you defined an Environment in NuGet.org (e.g., "release"), uncomment below:
    # environment: release 
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore and Build
        run: |
          dotnet restore sdks/csharp/
          dotnet build sdks/csharp/ --configuration Release --no-restore

      - name: Pack
        run: dotnet pack sdks/csharp/ --configuration Release --output ./nupkg

      - name: Publish to NuGet
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet nuget push "./nupkg/*.nupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate \
            --no-symbols true