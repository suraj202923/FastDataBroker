name: "[NuGet] C# SDK Publish"

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      publish_to_nuget:
        description: 'Publish to NuGet after tests (true/false)'
        required: false
        default: 'false'

concurrency:
  group: nuget-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 3
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet-version: ['8.0.x']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up .NET ${{ matrix.dotnet-version }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}
        cache: true
        cache-dependency-path: sdks/csharp/FastDataBrokerSDK.csproj
    
    - name: Restore NuGet packages
      working-directory: sdks/csharp
      run: dotnet restore
    
    - name: Build
      working-directory: sdks/csharp
      run: dotnet build --configuration Release --no-restore
    
    - name: Run unit tests
      working-directory: sdks/csharp
      run: dotnet test --configuration Release --no-build --verbosity normal
    
    - name: Generate code coverage
      working-directory: sdks/csharp
      run: dotnet test --configuration Release --no-build --collect:"XPlat Code Coverage" /p:CoverageOutputFormat=opencover
      continue-on-error: true

  publish-nuget:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref_type == 'tag') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_nuget == 'true')

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        cache: true
        cache-dependency-path: sdks/csharp/FastDataBrokerSDK.csproj
    
    - name: Restore dependencies
      working-directory: sdks/csharp
      run: dotnet restore
    
    - name: Build Release
      working-directory: sdks/csharp
      run: dotnet build --configuration Release --no-restore
    
    - name: Verify build output
      working-directory: sdks/csharp
      run: ls -la bin/Release/
    
    - name: Create output directory
      run: mkdir -p ${{ github.workspace }}/nupkg
    
    - name: Pack NuGet package
      working-directory: sdks/csharp
      run: |
        echo "Current directory: $(pwd)"
        echo "Output directory: ${{ github.workspace }}/nupkg"
        dotnet pack --configuration Release --output "${{ github.workspace }}/nupkg" -v d
        PACK_EXIT_CODE=$?
        echo "Pack command exit code: $PACK_EXIT_CODE"
        if [ $PACK_EXIT_CODE -ne 0 ]; then
          echo "❌ Pack failed!"
          exit 1
        fi
    
    - name: List packed files
      run: |
        echo "Listing nupkg directory:"
        if [ -d "${{ github.workspace }}/nupkg" ]; then
          ls -la "${{ github.workspace }}/nupkg/"
          echo ""
          echo "Total files:"
          find "${{ github.workspace }}/nupkg/" -type f | wc -l
        else
          echo "❌ Directory does not exist!"
          exit 1
        fi
    
    - name: Publish to NuGet (Trusted Publisher)
      run: |
        NUPKG_DIR="${{ github.workspace }}/nupkg"
        NUPKG_COUNT=$(find "$NUPKG_DIR" -name "*.nupkg" -type f | wc -l)
        echo "Found $NUPKG_COUNT .nupkg files"
        
        if [ $NUPKG_COUNT -eq 0 ]; then
          echo "❌ No .nupkg files found!"
          ls -la "$NUPKG_DIR"
          exit 1
        fi
        
        # Install jq for JSON parsing
        sudo apt-get update -qq && sudo apt-get install -y -qq jq > /dev/null 2>&1
        
        # Request OIDC token from GitHub
        TOKEN_REQUEST_URL="$ACTIONS_ID_TOKEN_REQUEST_URL&audience=nuget.org"
        OIDC_RESPONSE=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$TOKEN_REQUEST_URL")
        OIDC_TOKEN=$(echo "$OIDC_RESPONSE" | jq -r '.token' 2>/dev/null)
        
        if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
          echo "❌ Failed to obtain OIDC token"
          echo "Response: $OIDC_RESPONSE"
          exit 1
        fi
        
        echo "✓ OIDC token obtained successfully"
        
        find "$NUPKG_DIR" -name "*.nupkg" -type f | while read f; do
          echo "Publishing: $f"
          dotnet nuget push "$f" --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key "$OIDC_TOKEN"
        done
    
    - name: Create GitHub Release
      uses: actions/create-release@v1
      if: github.event_name == 'push' && github.ref_type == 'tag'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: FastDataBroker C# SDK ${{ github.ref }}
        body: |
          ## C# SDK Release
          
          **Version:** ${{ github.ref }}
          
          ### Changes
          - Supports .NET 6.0, 7.0, 8.0
          - Available on NuGet: https://www.nuget.org/packages/FastDataBroker/
          
          ### Installation
          ```
          dotnet add package FastDataBroker
          ```
        draft: false
        prerelease: false

  nuget-validation:
    needs: publish-nuget
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref_type == 'tag') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_nuget == 'true')

    steps:
    - name: Check NuGet package availability
      run: |
        PACKAGE_VERSION=${GITHUB_REF#refs/tags/v}
        echo "Checking NuGet for FastDataBroker ${PACKAGE_VERSION}..."
        sleep 30  # Wait for NuGet to index the package
        
        # Try to find the package on NuGet
        curl -s "https://api.nuget.org/v3/registration5-semver0/fastdatabroker/index.json" | grep -i "\"lower\":" || echo "Package not yet available, may take a few minutes to index"
      continue-on-error: true
