name: NuGet Publish (Multi-OS)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write   # 🔥 REQUIRED for Trusted Publishing

jobs:
  build-and-publish:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        working-directory: sdks/csharp
        run: dotnet restore

      - name: Build
        working-directory: sdks/csharp
        run: dotnet build --configuration Release --no-restore

      - name: Pack
        working-directory: sdks/csharp
        run: dotnet pack --configuration Release --output ${{ github.workspace }}/nupkg

      # --- PUBLISH LOGIC ---
      # We only want to push to NuGet once, so we pick the Linux runner to do the honors.
      - name: Publish to NuGet
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet nuget push "${{ github.workspace }}/nupkg/*.nupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate

      # Create GitHub Release (Only on Tags and from the Linux runner)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: matrix.os == 'ubuntu-latest' && startsWith(github.ref, 'refs/tags/')
        with:
          files: nupkg/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}