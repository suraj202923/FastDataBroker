name: NuGet Publish (Standalone)

on:
  push:
    tags:
      - 'v*'   # trigger only on version tags like v1.0.0
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # 🔥 REQUIRED for Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Restore dependencies
      - name: Restore dependencies
        working-directory: sdks/csharp
        run: dotnet restore

      # Build project
      - name: Build
        working-directory: sdks/csharp
        run: dotnet build --configuration Release --no-restore

      # Pack NuGet package
      - name: Pack
        working-directory: sdks/csharp
        run: dotnet pack --configuration Release --output ${{ github.workspace }}/nupkg

      # Verify package exists
      - name: Verify package
        run: |
          echo "Listing packages:"
          ls -la "${{ github.workspace }}/nupkg/" || true
          COUNT=$(ls "${{ github.workspace }}/nupkg/"*.nupkg 2>/dev/null | wc -l)

          if [ "$COUNT" -eq 0 ]; then
            echo "❌ No package found!"
            exit 1
          fi
      - name: Remove existing NuGet source
        run: dotnet nuget remove source nuget.org || true

      - name: Add NuGet source (v3)
        run: |
          dotnet nuget add source https://api.nuget.org/v3/index.json \
            --name nuget.org      
      - name: Publish to NuGet (Trusted Publishing)
        run: |
          for file in ${{ github.workspace }}/nupkg/*.nupkg; do
            echo "Publishing $file"
            dotnet nuget push "$file" \
              --skip-duplicate \
              --no-symbols true
          done
      # Optional: Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: nupkg/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

