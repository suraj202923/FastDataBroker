name: FastDataBroker Python Package

on: 
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      publish_to_pypi:
        description: 'Publish to PyPI after build (true/false)'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 15
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Add conda to system path
      run: |
        # $CONDA is an environment variable pointing to the root of the miniconda directory
        echo $CONDA/bin >> $GITHUB_PATH
    
    - name: Install dependencies
      run: |
        conda env update --file environment.yml --name base
        # Additional FastDataBroker specific dependencies
        conda install -c conda-forge rust maturin
        pip install -e python/
    
    - name: Lint with flake8
      run: |
        conda install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Type checking with mypy
      run: |
        pip install mypy
        if [ "${{ matrix.python-version }}" == "3.12" ]; then
          # Strict mode for Python 3.12
          mypy python/ --strict --no-implicit-optional --disallow-incomplete-defs --warn-unused-ignores
        else
          mypy python/ --ignore-missing-imports || true
        fi
    
    - name: Test with pytest
      run: |
        conda install pytest pytest-cov
        if [ "${{ matrix.python-version }}" == "3.12" ]; then
          # Strict testing for Python 3.12
          pytest tests/ -v --cov=fastdatabroker_sdk --cov-report=xml --strict-markers --tb=short -W error::DeprecationWarning
        else
          pytest tests/ -v --cov=fastdatabroker_sdk --cov-report=xml
        fi
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  test-python312-strict:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    name: "✅ Strict Python 3.12 Validation"
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Add conda to system path
      run: |
        echo $CONDA/bin >> $GITHUB_PATH
    
    - name: Install dependencies
      run: |
        conda env update --file environment.yml --name base
        conda install -c conda-forge rust maturin
        pip install -e python/
    
    - name: Strict lint with flake8 (Python 3.12)
      run: |
        pip install flake8
        # Fail on any style issues for Python 3.12
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Strict type checking with mypy (Python 3.12)
      run: |
        pip install mypy
        # Strict mode - must pass with no exceptions
        mypy python/ --strict --no-implicit-optional --disallow-incomplete-defs --warn-unused-ignores
    
    - name: Strict testing with pytest (Python 3.12)
      run: |
        pip install pytest pytest-cov
        # Fail on deprecation warnings and strict markers
        pytest tests/ -v --cov=fastdatabroker_sdk --cov-report=xml --strict-markers --tb=short -W error::DeprecationWarning -W error::PendingDeprecationWarning
    
    - name: Security check with bandit
      run: |
        pip install bandit
        bandit -r python/ -ll
    
    - name: Upload Python 3.12 coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: python312-strict
        name: python-3-12-strict

  build-and-publish:
    runs-on: ubuntu-latest
    needs: [build, test-python312-strict]
    if: startsWith(github.ref, 'refs/tags')
    permissions:
      id-token: write  # Required for OIDC token (Trusted Publishers)
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Build distribution
      run: |
        python -m pip install --upgrade build wheel twine
        cd python && python -m build
        ls -la dist/
    
    # Option 1: Using Trusted Publishers (Recommended - more secure, no token storage)
    - name: Publish to PyPI (Trusted Publishers)
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: python/dist/
        skip-existing: true
        verbose: true
      # Only run if Trusted Publishers is configured on PyPI
      continue-on-error: true
    
    # Option 2: Using API Token (Fallback)
    - name: Publish to PyPI (API Token - Fallback)
      uses: pypa/gh-action-pypi-publish@release/v1
      if: failure()  # Only runs if Trusted Publishers failed
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
        packages-dir: python/dist/
        skip-existing: true
      env:
        TWINE_USERNAME: __token__
    
    - name: Verify PyPI Upload
      run: |
        python -m pip install fastdatabroker-sdk==${{ github.ref_name }}
        python -c "import fastdatabroker_sdk; print(f'✅ FastDataBroker SDK {fastdatabroker_sdk.__version__} published successfully!')"
