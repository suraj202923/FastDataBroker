name: "[PyPI] Python SDK Publish"

on: 
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      publish_to_pypi:
        description: 'Publish to PyPI after build (true/false)'
        required: false
        default: 'false'

concurrency:
  group: pypi-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 15
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install dependencies
      run: |
        # Install build tools and SDK
        pip install maturin
        pip install -e python/
    
    - name: Lint with flake8
      run: |
        pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Type checking with mypy
      run: |
        pip install mypy
        if [ "${{ matrix.python-version }}" == "3.12" ]; then
          # Strict mode for Python 3.12
          mypy python/ --strict --no-implicit-optional --disallow-incomplete-defs --warn-unused-ignores
        else
          mypy python/ --ignore-missing-imports || true
        fi
    
    - name: Test with pytest
      run: |
        pip install pytest pytest-cov
        if [ "${{ matrix.python-version }}" == "3.12" ]; then
          # Strict testing for Python 3.12
          pytest tests/ -v --cov=fastdatabroker_sdk --cov-report=xml --strict-markers --tb=short -W error::DeprecationWarning
        else
          pytest tests/ -v --cov=fastdatabroker_sdk --cov-report=xml
        fi
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  test-python312-strict:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    name: "✅ Strict Python 3.12 Validation"
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install dependencies
      run: |
        # Install build tools
        pip install maturin
        pip install -e python/
    
    - name: Strict lint with flake8 (Python 3.12)
      run: |
        pip install flake8
        # Fail on any style issues for Python 3.12
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Strict type checking with mypy (Python 3.12)
      run: |
        pip install mypy
        # Strict mode - must pass with no exceptions
        mypy python/ --strict --no-implicit-optional --disallow-incomplete-defs --warn-unused-ignores
    
    - name: Strict testing with pytest (Python 3.12)
      run: |
        pip install pytest pytest-cov
        # Fail on deprecation warnings and strict markers
        pytest tests/ -v --cov=fastdatabroker_sdk --cov-report=xml --strict-markers --tb=short -W error::DeprecationWarning -W error::PendingDeprecationWarning
    
    - name: Security check with bandit
      run: |
        pip install bandit
        bandit -r python/ -ll
    
    - name: Upload Python 3.12 coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: python312-strict
        name: python-3-12-strict

  build-and-publish:
    runs-on: ubuntu-latest
    needs: [build, test-python312-strict]
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_pypi == 'true')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Build distribution
      run: |
        python -m pip install --upgrade build wheel twine
        cd python && python -m build
        ls -la dist/
    
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
        packages-dir: python/dist/
        skip-existing: true
        verbose: true
      env:
        TWINE_USERNAME: __token__
    
    - name: Verify PyPI Upload
      run: |
        sleep 10  # Wait for PyPI to process
        python -m pip install fastdatabroker-sdk
        python -c "import fastdatabroker_sdk; print('✅ FastDataBroker SDK published successfully!')"
