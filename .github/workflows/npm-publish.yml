name: "[NPM] JavaScript SDK Publish"

on: 
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      publish_to_npm:
        description: 'Publish to npm after tests (true/false)'
        required: false
        default: 'false'

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 3
      matrix:
        node-version: ['16.x', '18.x', '20.x']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
    
    - name: Install dependencies
      working-directory: sdks/javascript
      run: npm install
    
    - name: Build TypeScript
      working-directory: sdks/javascript
      run: npm run build
    
    - name: Lint with ESLint
      working-directory: sdks/javascript
      run: npm run lint
    
    - name: Format check with Prettier
      working-directory: sdks/javascript
      run: npx prettier --check src/**/*.ts
    
    - name: Run tests
      working-directory: sdks/javascript
      run: npm test -- --coverage
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./sdks/javascript/coverage/coverage-final.json
        flags: javascript
        name: codecov-javascript
        fail_ci_if_error: false

  build-quality:
    runs-on: ubuntu-latest
    name: "✅ Code Quality Check (TypeScript Strict)"
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js 20
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
    
    - name: Install dependencies
      working-directory: sdks/javascript
      run: npm install
    
    - name: Build with strict TypeScript
      working-directory: sdks/javascript
      run: npm run build -- --strict --noImplicitAny --strictNullChecks --strictFunctionTypes
    
    - name: Run security audit
      working-directory: sdks/javascript
      run: npm audit --audit-level=moderate || true
    
    - name: Check for vulnerable dependencies
      working-directory: sdks/javascript
      run: npx snyk test --severity-threshold=high || true

  publish-to-npm:
    runs-on: ubuntu-latest
    needs: [build-and-test, build-quality]
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_npm == 'true')
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        registry-url: 'https://registry.npmjs.org'
    
    - name: Install dependencies
      working-directory: sdks/javascript
      run: npm install
    
    - name: Build package
      working-directory: sdks/javascript
      run: npm run build
    
    - name: Run tests before publish
      working-directory: sdks/javascript
      run: npm test
    
    - name: Publish to npm
      working-directory: sdks/javascript
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    
    - name: Verify npm package
      run: |
        npm info @fastdatabroker/sdk
        echo "✅ Package published successfully!"
    
    - name: Install and test published package
      run: |
        mkdir /tmp/test-install
        cd /tmp/test-install
        npm install @fastdatabroker/sdk
        node -e "const sdk = require('@fastdatabroker/sdk'); console.log('✅ FastDataBroker SDK successfully installed and imported!');"

  publish-github-release:
    runs-on: ubuntu-latest
    needs: publish-to-npm
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_npm == 'true')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: "FastDataBroker JavaScript SDK ${{ github.ref }}"
        body: |
          ## JavaScript SDK Release
          
          **Version:** ${{ github.ref }}
          
          **Package:** @fastdatabroker/sdk
          
          ### Features
          - Full TypeScript support
          - Async/await support
          - WebSocket integration
          - Webhook support
          
          ### Installation
          ```bash
          npm install @fastdatabroker/sdk
          ```
          
          ### Changes in This Release
          See [GitHub Commits](https://github.com/suraj202923/FastDataBroker/commits/${{ github.ref_name }})
        draft: false
        prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
