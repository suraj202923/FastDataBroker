name: "[Docker] Image Build & Publish"

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      publish_to_docker:
        description: 'Publish to Docker Hub (true/false)'
        required: false
        default: 'false'

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ vars.DK_USERNAME }}/fastdatabroker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref_type == 'tag') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_docker == 'true')

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DK_USERNAME }}
        password: ${{ secrets.DK_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  scan-image:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref_type == 'tag') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_docker == 'true')

    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        format: 'sarif'
        output: 'trivy-results.sarif'
      continue-on-error: true

    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'
      continue-on-error: true

    - name: Verify image pushed
      run: |
        docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        echo "✓ Docker image successfully pushed and verified"

  docker-metadata:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref_type == 'tag') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_docker == 'true')

    steps:
    - name: Create Docker Hub metadata
      run: |
        IMAGE_VERSION=${GITHUB_REF#refs/tags/v}
        echo "# FastDataBroker Docker Image" > docker-info.md
        echo "" >> docker-info.md
        echo "**Version:** ${IMAGE_VERSION}" >> docker-info.md
        echo "**Registry:** Docker Hub" >> docker-info.md
        echo "**Repository:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> docker-info.md
        echo "" >> docker-info.md
        echo "## Pull Command" >> docker-info.md
        echo "❝\`\`\`bash" >> docker-info.md
        echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_VERSION}" >> docker-info.md
        echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> docker-info.md
        echo "\`\`\`" >> docker-info.md
        echo "" >> docker-info.md
        echo "## Run FastDataBroker" >> docker-info.md
        echo "❝\`\`\`bash" >> docker-info.md
        echo "docker run -d \\" >> docker-info.md
        echo "  --name fastdatabroker \\" >> docker-info.md
        echo "  -p 6000:6000 \\" >> docker-info.md
        echo "  -p 8080:8080 \\" >> docker-info.md
        echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> docker-info.md
        echo "\`\`\`" >> docker-info.md
        cat docker-info.md

    - name: Upload Docker metadata
      uses: actions/upload-artifact@v3
      with:
        name: docker-metadata
        path: docker-info.md
