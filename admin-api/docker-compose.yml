version: '3.8'

services:
  admin-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastdatabroker-admin-api
    ports:
      - "8080:8080"
    environment:
      RUST_LOG: info
      SERVER_ADDR: 0.0.0.0:8080
      BROKER_URL: http://broker:9092
      # Set strong API keys for production!
      ADMIN_API_KEYS: "admin-key-default-change-me,secondary-admin-key"
    volumes:
      - admin-tenants:/app/tenants
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - fastdatabroker
    restart: unless-stopped

  # Optional: Broker service (if not already running)
  broker:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-broker
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://broker:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - fastdatabroker
    depends_on:
      - zookeeper

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - fastdatabroker

volumes:
  admin-tenants:

networks:
  fastdatabroker:
    driver: bridge
