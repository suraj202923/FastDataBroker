[pytest]
minversion = 6.0
testpaths = tests/python tests/integration tests/performance
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: unit tests (fast)
    integration: integration tests (medium)
    clustering: clustering and multi-server tests
    failover: failover and resilience tests
    performance: performance and benchmark tests
    slow: marked tests are slow (deselect with '-m "not slow"')
    
# Output
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes

# Coverage
[coverage:run]
source = tests
omit =
    */tests/*
    */venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
